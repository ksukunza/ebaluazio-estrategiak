<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baliabideen altxorra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #76b895;
            --primary-dark: #5a8c73;
            --bg: #f3f4f6;
            --white: #ffffff;
            --text: #323130;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .contenedor {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
            background-color: #fcfcfc;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        form label {
            display: flex;
            flex-direction: column;
            font-weight: 600;
            font-size: 0.9rem;
            color: #605e5c;
        }

        form input, form select, form textarea {
            margin-top: 8px;
            padding: 12px;
            font-size: 15px;
            border: 1px solid #d1d1d1;
            border-radius: 6px;
            background-color: #fff;
        }

        form input:focus, form select:focus, form textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(118, 184, 149, 0.2);
        }

        .fila-completa { grid-column: 1 / -1; }

        /* Estilo para la pregunta resaltada */
        .pregunta-resaltada {
            background-color: #f0f9f4; /* Verde suave de fondo */
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--primary); /* Barra lateral verde */
            margin-bottom: 25px;
            color: var(--primary) !important;
            font-size: 1.1rem !important;
        }

        .pregunta-resaltada select {
            margin-top: 15px !important;
            width: 100%;
        }

        .botones {
            grid-column: 1 / -1;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary { background-color: var(--primary); color: white; flex: 2; }
        .btn-primary:hover { background-color: var(--primary-dark); }
        .btn-secondary { background-color: #fff; color: #666; border: 1px solid #ccc; flex: 1; }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; font-size: 0.9rem; }
        thead th {
            background-color: #f8f9fa;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid var(--primary);
        }
        tbody td { padding: 15px; border-bottom: 1px solid #e1dfdd; vertical-align: top; }
        tbody tr:hover { background-color: #f6faf8; }

        .opcion-tag {
            background-color: #eef7f2;
            color: #4e8a6b;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .footer-logo {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: right;
        }
        .footer-logo img { max-height: 60px; opacity: 0.9; }

        #loading { text-align: center; padding: 20px; color: #666; }

        @media (max-width: 750px) {
            form { grid-template-columns: 1fr; }
            thead { display: none; }
            tbody tr { display: block; border: 1px solid #eee; margin-bottom: 15px; border-radius: 8px; }
            tbody td { display: block; text-align: right; padding: 10px; border: none; border-bottom: 1px solid #f0f0f0; }
            tbody td::before { content: attr(data-label); float: left; font-weight: bold; color: #888; }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h2><i class="fa-solid fa-users-rectangle"></i> Baliabideen altxorra</h2>

    <form id="dataForm">
        <label>Ikastetxea <input type="text" id="ikastetxea" placeholder="Ikastetxearen izena..." required></label>
        <label>Kodea <input type="text" id="kodea" placeholder="Ikastetxearen kodea..." required></label>
        <label>Izen-abizenak <input type="text" id="izenAbizenak" placeholder="Zure izena..." required></label>
        <label>Emaila <input type="email" id="email" placeholder="adibidea@eskola.eus" required></label>

        <label class="fila-completa pregunta-resaltada">
            Zer estrategia “funtzional” eta zehatz erabiltzen dugu ebaluazio formatzailerako? (praktika onak):
            <select id="aukera" required>
                <option value="">Aukeratu bat...</option>
                <option value="Ikas-helburuak partekatzeko">Ikas-helburuak partekatzeko</option>
                <option value="Aurrezagutzak azaleratzeko">Aurrezagutzak azaleratzeko</option>
                <option value="Kalitatezko feedback emateko">Kalitatezko feedback emateko</option>
                <option value="Ko-ebaluazioa egiteko">Ko-ebaluazioa egiteko</option>
                <option value="Autoebaluazioa (erregulazioa) egiteko">Autoebaluazioa (erregulazioa) egiteko</option>
            </select>
        </label>

        <label class="fila-completa">
            Estrategiaren deskribapena
            <textarea id="deskribapena" rows="3" placeholder="Idatzi hemen deskribapena..." required></textarea>
        </label>

        <label class="fila-completa">
            Estrategiaren adibidea, esteka,...
            <input type="text" id="adibidea" placeholder="Adibidea edo esteka..." required>
        </label>

        <div class="botones">
            <button type="submit" class="btn-primary" id="btnEnviar">
                <i class="fa-solid fa-paper-plane"></i> Gehitu
            </button>
            <button type="button" class="btn-secondary" id="exportarCSV">
                <i class="fa-solid fa-file-csv"></i> CSV-ra esportatu
            </button>
        </div>
    </form>

    <div class="table-responsive">
        <table id="tablaCompleta">
            <thead>
                <tr>
                    <th width="20%">Ikastetxea / Kodea / Egilea</th>
                    <th width="20%">Aukeratutakoa</th>
                    <th width="30%">Deskribapena</th>
                    <th width="30%">Adibidea/Esteka</th>
                </tr>
            </thead>
            <tbody id="tablaDatos"></tbody>
        </table>
        <div id="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> Datuak kargatzen...</div>
    </div>

    <div class="footer-logo">
        <img src="Eskola.png" alt="Logotipoa">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Configuración de Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAV_g9Bd29B3kzuZqsHnE6WU4QzttmbhAk",
        authDomain: "ekarpenakapp.firebaseapp.com",
        projectId: "ekarpenakapp",
        storageBucket: "ekarpenakapp.firebasestorage.app",
        messagingSenderId: "958519034694",
        appId: "1:958519034694:web:e07751035d587322379b47"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tabla = document.getElementById("tablaDatos");
    const loading = document.getElementById("loading");

    // Guardar datos
    document.getElementById("dataForm").addEventListener("submit", async function (event) {
        event.preventDefault();
        const btn = document.getElementById("btnEnviar");
        
        const datos = {
            ikastetxea: document.getElementById("ikastetxea").value,
            kodea: document.getElementById("kodea").value,
            izenAbizenak: document.getElementById("izenAbizenak").value,
            email: document.getElementById("email").value,
            aukera: document.getElementById("aukera").value,
            deskribapena: document.getElementById("deskribapena").value,
            adibidea: document.getElementById("adibidea").value,
            fecha: serverTimestamp()
        };

        btn.disabled = true;
        btn.innerHTML = "Bidaltzen...";

        try {
            await addDoc(collection(db, "ekarpenak"), datos);
            this.reset();
        } catch (e) {
            alert("Errorea: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Gehitu';
        }
    });

    // Leer datos en tiempo real
    const q = query(collection(db, "ekarpenak"), orderBy("fecha", "desc"));
    onSnapshot(q, (snapshot) => {
        loading.style.display = "none";
        tabla.innerHTML = "";
        
        if (snapshot.empty) {
            tabla.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">Ez dago daturik oraindik.</td></tr>';
            return;
        }

        snapshot.forEach((documento) => {
            const d = documento.data();
            const fila = document.createElement("tr");

            fila.innerHTML = `
                <td data-label="Egilea">
                    <strong>${d.ikastetxea}</strong><br>
                    <small>K: ${d.kodea}</small><br>
                    <small>${d.izenAbizenak}</small>
                </td>
                <td data-label="Aukera"><span class="opcion-tag">${d.aukera}</span></td>
                <td data-label="Deskribapena">${d.deskribapena}</td>
                <td data-label="Adibidea">${d.adibidea.includes('http') ? `<a href="${d.adibidea}" target="_blank">Ikusi esteka</a>` : d.adibidea}</td>
            `;
            tabla.appendChild(fila);
        });
    });

    // Exportar a CSV
    document.getElementById("exportarCSV").addEventListener("click", function () {
        let csv = ["\uFEFFIkastetxea,Kodea,Egilea,Email,Aukera,Deskribapena,Adibidea"];
        onSnapshot(q, (snapshot) => {
            snapshot.forEach(doc => {
                const d = doc.data();
                csv.push(`"${d.ikastetxea}","${d.kodea}","${d.izenAbizenak}","${d.email}","${d.aukera}","${d.deskribapena.replace(/"/g, '""')}","${d.adibidea}"`);
            });
            const blob = new Blob([csv.join("\n")], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "baliabideak.csv";
            link.click();
        }, { onlyOnce: true });
    });
</script>
</body>
</html>
