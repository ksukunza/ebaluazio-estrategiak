<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebaluaziorako estrategiak</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #76b895;
            --primary-dark: #4a7a62;
            --bg: #f3f4f6;
            --white: #ffffff;
            --text: #323130;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            line-height: 1.5;
        }

        .contenedor {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        h2 { text-align: center; color: var(--primary); font-size: 1.5rem; margin-bottom: 20px; }

        form {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
            background-color: #fcfcfc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        @media (min-width: 768px) {
            .contenedor { padding: 40px; }
            form { grid-template-columns: 1fr 1fr; padding: 25px; gap: 20px; }
        }

        form label { display: flex; flex-direction: column; font-weight: 600; font-size: 0.9rem; color: #605e5c; }
        form input, form select, form textarea { margin-top: 8px; padding: 12px; font-size: 16px; border: 1px solid #d1d1d1; border-radius: 6px; width: 100%; box-sizing: border-box; }
        
        .campo-autocompletado { background-color: #f0f0f0; color: #777; cursor: not-allowed; }

        .bloque-estrategia {
            grid-column: 1 / -1;
            background-color: #f0f9f4;
            padding: 20px;
            border-radius: 10px;
            border-left: 6px solid var(--primary);
            margin-top: 10px;
        }

        .titulo-estrategia { color: var(--primary-dark); font-size: 1.1rem; font-weight: 800; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .subtitulo-estrategia { font-size: 0.85rem; color: #666; font-style: italic; margin-bottom: 15px; padding-left: 24px; line-height: 1.4; white-space: pre-line; }

        .botones { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        @media (min-width: 480px) { .botones { flex-direction: row; } }

        button { padding: 14px 24px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background-color: var(--primary); color: white; flex: 2; }
        .btn-secondary { background-color: #fff; color: #666; border: 1px solid #ccc; flex: 1; }

        .admin-only { display: none; margin-top: 30px; } 
        .table-responsive { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        thead th { background-color: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid var(--primary); }
        tbody td { padding: 15px; border-bottom: 1px solid #e1dfdd; vertical-align: top; }
        .opcion-tag { background-color: #eef7f2; color: #4e8a6b; padding: 3px 8px; border-radius: 10px; font-weight: bold; font-size: 0.8rem; }
        
        .admin-trigger { margin-top: 60px; text-align: center; opacity: 0.15; transition: opacity 0.3s; }
        .admin-trigger:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2><i class="fa-solid fa-users-rectangle"></i> Ebaluaziorako estrategiak</h2>

    <form id="dataForm">
        <label>Ikastetxea <select id="selectCentro" required><option value="">Aukeratu...</option></select></label>
        <label>Izen-abizenak <select id="selectProfesor" required disabled><option value="">Aukeratu...</option></select></label>
        <label>Kodea <input type="text" id="kodea" class="campo-autocompletado" readonly></label>
        <label>Emaila <input type="email" id="email" class="campo-autocompletado" readonly></label>

        <div id="estrategiasContenedor" style="grid-column: 1 / -1;"></div>

        <div class="botones">
            <button type="submit" class="btn-primary" id="btnEnviar"><i class="fa-solid fa-paper-plane"></i> Bidali denak</button>
        </div>
    </form>

    <div id="seccionAdmin" class="admin-only">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin:0; color: var(--primary-dark);">Jasotako erantzunak</h3>
            <button type="button" class="btn-secondary" id="exportarCSV" style="padding: 8px 16px; font-size: 0.8rem;">
                <i class="fa-solid fa-file-csv"></i> CSV deskargatu
            </button>
        </div>
        <div class="table-responsive">
            <table id="tablaCompleta">
                <thead>
                    <tr>
                        <th>Egilea</th>
                        <th>Estrategia</th>
                        <th>Deskribapena</th>
                        <th>Adibidea</th>
                    </tr>
                </thead>
                <tbody id="tablaDatos"></tbody>
            </table>
        </div>
    </div>

    <div class="admin-trigger">
        <button onclick="desbloquearTodo()" style="background: none; color: #ccc; border: none; cursor: pointer; font-size: 10px;">
            <i class="fa-solid fa-lock"></i>
        </button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- BASE DE DATOS PROFESORES ---
    const profesoresDB = {
        "Marta Martin Lopez": { centro: "Samaniego IPI", codigo: " 010613", email: "martamartin@irakasle.eus" },
"Izarne Aguirre Elorriaga": { centro: "TXORIERRI BHI", codigo: " 014466", email: "i.aguirre@irakasle.eus" },
"Maialen Garcia Portalo": { centro: "ANITURRI BHI", codigo: "010046", email: "garciaportalo@irakasle.eus" },
"Ametsa Nerea Fuente Nuñez": { centro: "Los Herran BHI", codigo: "010135", email: "an.fuente@irakasle.eus" },
"Agurtzane Ugarte Ozaeta": { centro: "MURGIA BHI", codigo: "010157", email: "a.ugarteozaeta@irakasle.eus" },
"Nagore Iturbe Bilbao": { centro: "LAKUA BHI", codigo: "010512", email: "n.iturbe@irakasle.eus" },
"Sara Corcero Gonzalo": { centro: "Salburua BHI", codigo: "010514", email: "s.corcero@irakasle.eus" },
"Ane Bedayo Pascual": { centro: "Aldaialde IPI", codigo: "010617", email: "a.bedayo@irakasle.eus" },
"Ana Carmona Poza": { centro: "Olamendi BHI", codigo: "012117", email: "a.carmona@irakasle.eus" },
"Ane Miren Etxegarai Irigoien": { centro: "Karmengo Ama IPI", codigo: "012150", email: "etxegaraiirigoien@irakasle.eus" },
"Josune Iñarra Laskurain": { centro: "Altza BHI ", codigo: "012224", email: "laskurain@irakasle.eus" },
"Xabier Garmendia Garcia": { centro: "JM Iparragirre BHI", codigo: "012286", email: "x.garmendia@irakasle.eus" },
"Iraia San Miguel Lizarralde": { centro: "Soraluze BHI", codigo: "012946", email: "i.sanmiguellizarralde@irakasle.eus" },
"Matilde Navas Los Arcos": { centro: "Lauaizeta Ikastola BHI", codigo: "012958", email: "matti@irakasle.eus" },
"Eneritz Garmendia Ollokiegi": { centro: "Lezo BHI", codigo: "012962", email: "eneritzgarmendia@irakasle.eus" },
"Izaskun Ormaetxea Jauregi": { centro: "Orixe BHI", codigo: "012980", email: "ormaetxea@irakasle.eus" },
"Cynthia Cubero Larrabeiti": { centro: "Azkoitia BHI", codigo: "012985", email: "c.cubero@irakasle.eus" },
"Amaya Muniategi-Andicoechea Zubizarreta": { centro: "Arrasate BHI", codigo: "013006", email: "amaiamuni@irakasle.eus" },
"Olatz Goikoetxeaundia Usandizaga": { centro: "Oñati BHI", codigo: "013015", email: "o.goikoetxeaundia@irakasle.eus" },
"Marta Garcia Gutierrez": { centro: "Elgoibar BHI", codigo: "013431", email: "m.garciagutierrez@irakasle.eus" },
"Naiara Lasa Sainz": { centro: "Beasain BHI", codigo: "013461", email: "n.lasa@irakasle.eus" },
"Gorka Arruzazabala Gomez": { centro: "Antonio Trueba BHI Barakaldo", codigo: "014064", email: "g.gomez@irakasle.eus" },
"Oihana Urquiza Merino": { centro: "Pagasarribide IPI", codigo: "014140", email: "o.urquiza@irakasle.eus" },
"Ana Perez Fernandez": { centro: "Martín de Bertendona BHI", codigo: "014187", email: "a.perez.f@irakasle.eus" },
"Eritz Vizcaya Ozaeta": { centro: "J.B. Eguzkitza Meabe IPI", codigo: "014341", email: "e.vizcaya@irakasle.eus" },
"Jaime Perez Martin": { centro: "JA Zunzunegui BHI", codigo: "014398", email: "j.perezmartin@irakasle.eus" },
"Virginia Tome Cabero": { centro: "Balmaseda BHI", codigo: "014451", email: "v.tome@irakasle.eus" },
"Miren Ivon Amorrortu Amarica": { centro: "Arratia BHI", codigo: "014456", email: "ibone@irakasle.eus" },
"Edorta Petralanda Sanjines": { centro: "Luis Briñas-Santutxu BHI", codigo: "015075", email: "e.petralanda@irakasle.eus" },
"Eskarne Zabala Lodos": { centro: "Zorrotza bhi", codigo: "015078", email: "eskarnezabala@irakasle.eus" },
"Miren Gotzone Larrea Gorostiaga": { centro: "Etxebarri BHI", codigo: "015087", email: "mg.larrea@irakasle.eus" },
"Gorane Fernandez Beitia": { centro: "Bengoetxe BHI", codigo: "015088", email: "g.fernandezbeitia@irakasle.eus" },
"Andrea Balentziaga Ibarlucea": { centro: "Juan Orobiogoitia BHI", codigo: "015090", email: "a.balentziaga@irakasle.eus" },
"Itziar Aparicio Peña": { centro: "Muskiz BHI", codigo: "015092", email: "i.apariciopena@irakasle.eus" },
"Itsasne Ordeñana Bengoa": { centro: "San Inazio BHI", codigo: "015191", email: "i.ordenana@irakasle.eus" },
"Maria Carmen Diez Gutierrez": { centro: "Axular BHI", codigo: "015626", email: "maria.carmendiez@irakasle.eus" },
"Maria Josefa Colmenero Herrera": { centro: "Antonio Trueba IPI", codigo: "015683", email: "colmeneroherrera@irakasle.eus" },
"Maria Asuncion Requero Zabala": { centro: "Ignacio Ellacuria-Zurbaran BHI", codigo: "015724", email: "requerozabala@irakasle.eus" },
"Monike Gojenola Elizondo": { centro: "Ermua BHI", codigo: "015779", email: "m.gojenola@irakasle.eus" },


    };

    // --- CATEGORÍAS CON TEXTOS COMPLETOS ---
    const categorias = [
        { 
            titulo: "Ikas-helburuak partekatzeko estrategiak", 
            subtitulo: "Zein jarduera edo estrategia erabiltzen ditugu ikasleek argi ulertzeko zein diren lortu nahi diren ikas‑helburuak?\nNola dakite zer ikasi behar duten eta zer egingo duten hori lortzeko?" 
        },
        { 
            titulo: "Ebaluazioaren diseinua egiteko estrategia", 
            subtitulo: "Zein jarduera edo estrategia erabiltzen ditugu ebidentzia esanguratsuak lortzeko?\nNola biltzen dugu ikasleek dakitenari buruzko informazioa?" 
        },
        { 
            titulo: "Kalitatezko feedback emateko", 
            subtitulo: "Zein estrategia edo jarduera erabiltzen ditugu feedbacka eskaintzeko?\nNola laguntzen diegu ikasleei aurrera egiten?" 
        },
        { 
            titulo: "Ko-ebaluazioa egiteko", 
            subtitulo: "Zein estrategia erabiltzen ditugu ikasleek elkarri feedbacka emateko?\nNola bultzatzen dugu ikasleen arteko elkarrekiko laguntza?" 
        },
        { 
            titulo: "Autoebaluazioa (erregulazioa) egiteko", 
            subtitulo: "Zein estrategia hausnarketa autonomoa egiteko (auto-feedbacka)?\nZein estrategia erabiltzen dugu ikasleak bere ikaskuntza-prozesuaz jabetzeko?" 
        }
    ];

    // --- GENERAR FORMULARIO ---
    const contenedor = document.getElementById("estrategiasContenedor");
    categorias.forEach(cat => {
        const div = document.createElement("div");
        div.className = "bloque-estrategia";
        div.innerHTML = `
            <div class="titulo-estrategia"><i class="fa-solid fa-chevron-right"></i> ${cat.titulo}</div>
            <div class="subtitulo-estrategia">${cat.subtitulo}</div>
            <div class="campos-estrategia">
                <label class="full-width">Deskribapena <textarea class="desc-input" data-cat="${cat.titulo}" rows="2"></textarea></label>
                <label class="full-width">Adibidea (esteka edo testua) <input type="text" class="link-input" data-cat="${cat.titulo}"></label>
            </div>`;
        contenedor.appendChild(div);
    });

    // --- LÓGICA DE AUTOCOMPLETADO ---
    const selectCentro = document.getElementById("selectCentro");
    const selectProfesor = document.getElementById("selectProfesor");
    const inputKodea = document.getElementById("kodea");
    const inputEmail = document.getElementById("email");

    const centrosUnicos = [...new Set(Object.values(profesoresDB).map(p => p.centro))].sort();
    centrosUnicos.forEach(c => {
        let opt = document.createElement("option"); opt.value = c; opt.textContent = c;
        selectCentro.appendChild(opt);
    });

    selectCentro.addEventListener("change", () => {
        const centroSel = selectCentro.value;
        selectProfesor.innerHTML = '<option value="">Aukeratu...</option>';
        inputEmail.value = ""; 
        inputKodea.value = "";
        
        if (centroSel) {
            selectProfesor.disabled = false;
            const profesDeEsteCentro = Object.keys(profesoresDB).filter(n => profesoresDB[n].centro === centroSel);
            
            profesDeEsteCentro.forEach(n => {
                let o = document.createElement("option"); o.value = n; o.textContent = n;
                selectProfesor.appendChild(o);
            });

            // Rellenar código
            inputKodea.value = profesoresDB[profesDeEsteCentro[0]].codigo;

            // Selección automática si solo hay uno
            if (profesDeEsteCentro.length === 1) {
                selectProfesor.value = profesDeEsteCentro[0];
                inputEmail.value = profesoresDB[profesDeEsteCentro[0]].email;
            }
        } else {
            selectProfesor.disabled = true;
        }
    });

    selectProfesor.addEventListener("change", () => {
        const p = profesoresDB[selectProfesor.value];
        inputEmail.value = p ? p.email : "";
    });

    // --- FIREBASE SETUP ---
    const firebaseConfig = {
        apiKey: "AIzaSyAV_g9Bd29B3kzuZqsHnE6WU4QzttmbhAk",
        authDomain: "ekarpenakapp.firebaseapp.com",
        projectId: "ekarpenakapp",
        storageBucket: "ekarpenakapp.firebasestorage.app",
        messagingSenderId: "958519034694",
        appId: "1:958519034694:web:e07751035d587322379b47"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- GUARDADO ---
    document.getElementById("dataForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnEnviar");
        const descs = document.querySelectorAll(".desc-input");
        const links = document.querySelectorAll(".link-input");
        btn.disabled = true;

        try {
            for (let i = 0; i < descs.length; i++) {
                if (descs[i].value.trim() !== "") {
                    await addDoc(collection(db, "ekarpenak"), {
                        ikastetxea: selectCentro.value,
                        kodea: inputKodea.value,
                        izenAbizenak: selectProfesor.value,
                        email: inputEmail.value,
                        aukera: descs[i].dataset.cat,
                        deskribapena: descs[i].value.trim(),
                        adibidea: links[i].value.trim(),
                        fecha: serverTimestamp()
                    });
                }
            }
            alert("Datuak ondo gorde dira!");
            e.target.reset();
            selectProfesor.disabled = true;
        } catch (err) { alert(err.message); }
        finally { btn.disabled = false; }
    });

    // --- ACTUALIZACIÓN TABLA ---
    const q = query(collection(db, "ekarpenak"), orderBy("fecha", "desc"));
    onSnapshot(q, (snapshot) => {
        const tabla = document.getElementById("tablaDatos");
        tabla.innerHTML = "";
        snapshot.forEach((doc) => {
            const d = doc.data();
            const fila = document.createElement("tr");
            fila.innerHTML = `
                <td><strong>${d.ikastetxea}</strong><br><small>${d.izenAbizenak}</small></td>
                <td><span class="opcion-tag">${d.aukera}</span></td>
                <td>${d.deskribapena}</td>
                <td>${d.adibidea.includes('http') ? `<a href="${d.adibidea}" target="_blank">Lotura</a>` : d.adibidea}</td>`;
            tabla.appendChild(fila);
        });
    });

    // --- ACCESO ADMIN ---
    window.desbloquearTodo = function() {
        const pass = prompt("Sartu pasahitza:");
        if (pass === "1234") { 
            document.getElementById("seccionAdmin").style.display = "block";
        } else {
            alert("Okerra!");
        }
    };

    // --- LÓGICA CSV ---
    document.getElementById("exportarCSV").addEventListener("click", () => {
        const filas = document.querySelectorAll("#tablaCompleta tr");
        let csv = "Egilea;Estrategia;Deskribapena;Adibidea\n";
        filas.forEach((f, i) => {
            if (i === 0) return;
            const cols = f.querySelectorAll("td");
            csv += `"${cols[0].innerText.replace(/\n/g, ' ')}";"${cols[1].innerText}";"${cols[2].innerText}";"${cols[3].innerText}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ebaluazio_estrategiak.csv";
        link.click();
    });
</script>
</body>
</html>
