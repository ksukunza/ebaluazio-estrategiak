<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebaluaziorako estrategiak</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #76b895;
            --primary-dark: #4a7a62;
            --bg: #f3f4f6;
            --white: #ffffff;
            --text: #323130;
        }

        /* Estilos Base */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px; /* Reducido para móviles */
            line-height: 1.5;
        }

        .contenedor {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--white);
            padding: 20px; /* Reducido para móviles */
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem; /* Adaptable */
            margin-bottom: 20px;
        }

        /* Formulario Responsive */
        form {
            display: grid;
            grid-template-columns: 1fr; /* Por defecto una columna (móvil) */
            gap: 15px;
            margin-bottom: 30px;
            background-color: #fcfcfc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        /* En pantallas más grandes que 768px, usamos dos columnas */
        @media (min-width: 768px) {
            body { padding: 20px; }
            .contenedor { padding: 40px; }
            h2 { font-size: 1.8rem; }
            form { grid-template-columns: 1fr 1fr; padding: 25px; gap: 20px; }
            .fila-escritorio { grid-column: 1 / -1; }
        }

        form label {
            display: flex;
            flex-direction: column;
            font-weight: 600;
            font-size: 0.9rem;
            color: #605e5c;
        }

        form input, form select, form textarea {
            margin-top: 8px;
            padding: 12px;
            font-size: 16px; /* 16px evita el zoom automático en iOS */
            border: 1px solid #d1d1d1;
            border-radius: 6px;
            background-color: #fff;
            width: 100%;
            box-sizing: border-box;
        }

        /* Bloque de Estrategia */
        .seccion-estrategia {
            grid-column: 1 / -1;
            background-color: #f0f9f4;
            padding: 20px;
            border-radius: 10px;
            border-left: 6px solid var(--primary);
            display: grid;
            gap: 15px;
        }

        .seccion-estrategia label:first-child {
            color: var(--primary-dark) !important;
            font-size: 1.15rem !important;
            font-weight: 800 !important;
            border-bottom: 1px solid rgba(118, 184, 149, 0.3);
            padding-bottom: 10px;
        }

        .botones {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column; /* Botones uno encima de otro en móvil */
            gap: 10px;
        }

        @media (min-width: 480px) {
            .botones { flex-direction: row; }
        }

        button {
            padding: 14px 24px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-secondary { background-color: #fff; color: #666; border: 1px solid #ccc; }

        /* TABLA RESPONSIVA (Modo Tarjeta en móvil) */
        .table-responsive { overflow-x: hidden; }
        
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid #e1dfdd; margin-bottom: 15px; border-radius: 8px; background: #fff; padding: 10px; }
            td {
                border: none;
                position: relative;
                padding-left: 45% !important;
                text-align: right !important;
                padding-top: 10px;
                padding-bottom: 10px;
                border-bottom: 1px solid #eee;
            }
            td:last-child { border-bottom: none; }
            td::before {
                content: attr(data-label);
                position: absolute;
                left: 10px;
                width: 40%;
                text-align: left;
                font-weight: bold;
                color: var(--primary-dark);
                font-size: 0.8rem;
                text-transform: uppercase;
            }
        }

        /* Estilos Tabla Escritorio */
        @media (min-width: 769px) {
            table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; }
            thead th { background-color: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid var(--primary); }
            tbody td { padding: 15px; border-bottom: 1px solid #e1dfdd; vertical-align: top; }
        }

        .opcion-tag {
            background-color: #eef7f2;
            color: #4e8a6b;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .footer-logo { margin-top: 30px; text-align: center; }
        @media (min-width: 768px) { .footer-logo { text-align: right; } }
        .footer-logo img { max-height: 50px; opacity: 0.9; }

        #loading { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2><i class="fa-solid fa-users-rectangle"></i> Ebaluaziorako estrategiak</h2>

    <form id="dataForm">
        <label>Ikastetxea <input type="text" id="ikastetxea" placeholder="Ikastetxearen izena..." required></label>
        <label>Kodea <input type="text" id="kodea" placeholder="Ikastetxearen kodea..." required></label>
        <label>Izen-abizenak <input type="text" id="izenAbizenak" placeholder="Zure izena..." required></label>
        <label>Emaila <input type="email" id="email" placeholder="adibidea@eskola.eus" required></label>

        <div class="seccion-estrategia">
            <label>
                Zer estrategia “funtzional” eta zehatz erabiltzen dugu ebaluazio formatzailerako? (praktika onak):
                <select id="aukera" required>
                    <option value="">Aukeratu bat...</option>
                    <option value="Ikas-helburuak partekatzeko">Ikas-helburuak partekatzeko</option>
                    <option value="Aurrezagutzak azaleratzeko">Aurrezagutzak azaleratzeko</option>
                    <option value="Kalitatezko feedback emateko">Kalitatezko feedback emateko</option>
                    <option value="Ko-ebaluazioa egiteko">Ko-ebaluazioa egiteko</option>
                    <option value="Autoebaluazioa (erregulazioa) egiteko">Autoebaluazioa (erregulazioa) egiteko</option>
                </select>
            </label>

            <label>
                Estrategiaren deskribapena
                <textarea id="deskribapena" rows="3" placeholder="Idatzi hemen deskribapena..." required></textarea>
            </label>

            <label>
                Estrategiaren adibidea, esteka,...
                <input type="text" id="adibidea" placeholder="Adibidea edo esteka..." required>
            </label>
        </div>

        <div class="botones">
            <button type="submit" class="btn-primary" id="btnEnviar">
                <i class="fa-solid fa-paper-plane"></i> Gehitu
            </button>
            <button type="button" class="btn-secondary" id="exportarCSV">
                <i class="fa-solid fa-file-csv"></i> CSV
            </button>
        </div>
    </form>

    <div class="table-responsive">
        <table id="tablaCompleta">
            <thead>
                <tr>
                    <th>Egilea</th>
                    <th>Aukeratutakoa</th>
                    <th>Deskribapena</th>
                    <th>Adibidea</th>
                </tr>
            </thead>
            <tbody id="tablaDatos"></tbody>
        </table>
        <div id="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> Datuak kargatzen...</div>
    </div>

    <div class="footer-logo">
        <img src="Eskola.png" alt="Logotipoa">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAV_g9Bd29B3kzuZqsHnE6WU4QzttmbhAk",
        authDomain: "ekarpenakapp.firebaseapp.com",
        projectId: "ekarpenakapp",
        storageBucket: "ekarpenakapp.firebasestorage.app",
        messagingSenderId: "958519034694",
        appId: "1:958519034694:web:e07751035d587322379b47"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tabla = document.getElementById("tablaDatos");
    const loading = document.getElementById("loading");

    document.getElementById("dataForm").addEventListener("submit", async function (event) {
        event.preventDefault();
        const btn = document.getElementById("btnEnviar");
        const datos = {
            ikastetxea: document.getElementById("ikastetxea").value,
            kodea: document.getElementById("kodea").value,
            izenAbizenak: document.getElementById("izenAbizenak").value,
            email: document.getElementById("email").value,
            aukera: document.getElementById("aukera").value,
            deskribapena: document.getElementById("deskribapena").value,
            adibidea: document.getElementById("adibidea").value,
            fecha: serverTimestamp()
        };

        btn.disabled = true;
        btn.innerHTML = "Bidaltzen...";

        try {
            await addDoc(collection(db, "ekarpenak"), datos);
            this.reset();
        } catch (e) {
            alert("Errorea: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Gehitu';
        }
    });

    const q = query(collection(db, "ekarpenak"), orderBy("fecha", "desc"));
    onSnapshot(q, (snapshot) => {
        loading.style.display = "none";
        tabla.innerHTML = "";
        
        snapshot.forEach((documento) => {
            const d = documento.data();
            const fila = document.createElement("tr");

            fila.innerHTML = `
                <td data-label="Egilea">
                    <strong>${d.ikastetxea}</strong><br>
                    <small>${d.izenAbizenak}</small>
                </td>
                <td data-label="Aukera"><span class="opcion-tag">${d.aukera}</span></td>
                <td data-label="Deskribapena">${d.deskribapena}</td>
                <td data-label="Adibidea">${d.adibidea.includes('http') ? `<a href="${d.adibidea}" target="_blank">Ikusi</a>` : d.adibidea}</td>
            `;
            tabla.appendChild(fila);
        });
    });

    document.getElementById("exportarCSV").addEventListener("click", function () {
        let csv = ["\uFEFFIkastetxea,Kodea,Egilea,Email,Aukera,Deskribapena,Adibidea"];
        onSnapshot(q, (snapshot) => {
            snapshot.forEach(doc => {
                const d = doc.data();
                csv.push(`"${d.ikastetxea}","${d.kodea}","${d.izenAbizenak}","${d.email}","${d.aukera}","${d.deskribapena.replace(/"/g, '""')}","${d.adibidea}"`);
            });
            const blob = new Blob([csv.join("\n")], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "ebaluazio_estrategiak.csv";
            link.click();
        }, { onlyOnce: true });
    });
</script>

</body>
</html>
