<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebaluaziorako estrategiak</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #76b895;
            --primary-dark: #4a7a62;
            --bg: #f3f4f6;
            --white: #ffffff;
            --text: #323130;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            line-height: 1.5;
        }

        .contenedor {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        h2 { text-align: center; color: var(--primary); font-size: 1.5rem; margin-bottom: 20px; }

        form {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
            background-color: #fcfcfc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        @media (min-width: 768px) {
            .contenedor { padding: 40px; }
            form { grid-template-columns: 1fr 1fr; padding: 25px; gap: 20px; }
        }

        form label { display: flex; flex-direction: column; font-weight: 600; font-size: 0.9rem; color: #605e5c; }
        form input, form select, form textarea { margin-top: 8px; padding: 12px; font-size: 16px; border: 1px solid #d1d1d1; border-radius: 6px; width: 100%; box-sizing: border-box; }
        
        .campo-autocompletado { background-color: #f0f0f0; color: #777; cursor: not-allowed; }

        .bloque-estrategia {
            grid-column: 1 / -1;
            background-color: #f0f9f4;
            padding: 20px;
            border-radius: 10px;
            border-left: 6px solid var(--primary);
            margin-top: 10px;
        }

        .titulo-estrategia { color: var(--primary-dark); font-size: 1.1rem; font-weight: 800; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .subtitulo-estrategia { font-size: 0.85rem; color: #666; font-style: italic; margin-bottom: 15px; padding-left: 24px; line-height: 1.4; white-space: pre-line; }

        .botones { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        @media (min-width: 480px) { .botones { flex-direction: row; } }

        button { padding: 14px 24px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background-color: var(--primary); color: white; flex: 2; }
        .btn-secondary { background-color: #fff; color: #666; border: 1px solid #ccc; flex: 1; }

        .admin-only { display: none; margin-top: 30px; } 
        .table-responsive { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        thead th { background-color: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid var(--primary); }
        tbody td { padding: 15px; border-bottom: 1px solid #e1dfdd; vertical-align: top; }
        .opcion-tag { background-color: #eef7f2; color: #4e8a6b; padding: 3px 8px; border-radius: 10px; font-weight: bold; font-size: 0.8rem; }
        
        .admin-trigger { margin-top: 60px; text-align: center; opacity: 0.15; transition: opacity 0.3s; }
        .admin-trigger:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2><i class="fa-solid fa-users-rectangle"></i> Ebaluaziorako estrategiak</h2>

    <form id="dataForm">
        <label>Ikastetxea <select id="selectCentro" required><option value="">Aukeratu...</option></select></label>
        <label>Izen-abizenak <select id="selectProfesor" required disabled><option value="">Aukeratu...</option></select></label>
        <label>Kodea <input type="text" id="kodea" class="campo-autocompletado" readonly></label>
        <label>Emaila <input type="email" id="email" class="campo-autocompletado" readonly></label>

        <div id="estrategiasContenedor" style="grid-column: 1 / -1;"></div>

        <div class="botones">
            <button type="submit" class="btn-primary" id="btnEnviar"><i class="fa-solid fa-paper-plane"></i> Bidali denak</button>
        </div>
    </form>

    <div id="seccionAdmin" class="admin-only">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin:0; color: var(--primary-dark);">Jasotako erantzunak</h3>
            <button type="button" class="btn-secondary" id="exportarCSV" style="padding: 8px 16px; font-size: 0.8rem;">
                <i class="fa-solid fa-file-csv"></i> CSV deskargatu
            </button>
        </div>
        <div class="table-responsive">
            <table id="tablaCompleta">
                <thead>
                    <tr>
                        <th>Egilea / Ikastetxea</th>
                        <th>Estrategia</th>
                        <th>Deskribapena</th>
                        <th>Adibidea</th>
                        <th style="display:none">Email</th>
                        <th style="display:none">Kodea</th>
                    </tr>
                </thead>
                <tbody id="tablaDatos"></tbody>
            </table>
        </div>
    </div>

    <div class="admin-trigger">
        <button onclick="desbloquearTodo()" style="background: none; color: #ccc; border: none; cursor: pointer; font-size: 10px;">
            <i class="fa-solid fa-lock"></i>
        </button>
    </div>
</div>

    // --- CATEGORÍAS COMPLETAS ---
    const categorias = [
        { titulo: "Ikas-helburuak partekatzeko estrategiak", subtitulo: "Zein jarduera edo estrategia erabiltzen ditugu ikasleek argi ulertzeko zein diren lortu nahi diren ikas‑helburuak?\nNola dakite zer ikasi behar duten eta zer egingo duten hori lortzeko?" },

    const contenedor = document.getElementById("estrategiasContenedor");
    categorias.forEach(cat => {
        const div = document.createElement("div");
        div.className = "bloque-estrategia";
        div.innerHTML = `
            <div class="titulo-estrategia"><i class="fa-solid fa-chevron-right"></i> ${cat.titulo}</div>

    // --- LÓGICA DE AUTOCOMPLETADO ---

    const inputEmail = document.getElementById("email");

    const centrosUnicos = [...new Set(Object.values(profesoresDB).map(p => p.centro))].sort();
    centrosUnicos.forEach(c => {
        let opt = document.createElement("option"); opt.value = c; opt.textContent = c;
        selectCentro.appendChild(opt);
    });

    selectCentro.addEventListener("change", () => {
        const centroSel = selectCentro.value;
        selectProfesor.innerHTML = '<option value="">Aukeratu...</option>';
        inputEmail.value = ""; inputKodea.value = "";
        if (centroSel) {
            selectProfesor.disabled = false;
            const profesDeEsteCentro = Object.keys(profesoresDB).filter(n => profesoresDB[n].centro === centroSel);

                let o = document.createElement("option"); o.value = n; o.textContent = n;
                selectProfesor.appendChild(o);
            });

                selectProfesor.value = profesDeEsteCentro[0];
                inputEmail.value = profesoresDB[profesDeEsteCentro[0]].email;
            }
        } else { selectProfesor.disabled = true; }
    });

        appId: "1:958519034694:web:e07751035d587322379b47"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById("dataForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnEnviar");
        const descs = document.querySelectorAll(".desc-input");
        const links = document.querySelectorAll(".link-input");
        btn.disabled = true;

        try {
            for (let i = 0; i < descs.length; i++) {
                if (descs[i].value.trim() !== "") {
                    await addDoc(collection(db, "ekarpenak"), {
                        ikastetxea: selectCentro.value,
                        kodea: inputKodea.value,
                        izenAbizenak: selectProfesor.value,
                        email: inputEmail.value,
                        aukera: descs[i].dataset.cat,
                        deskribapena: descs[i].value.trim(),
                        adibidea: links[i].value.trim(),
                        fecha: serverTimestamp()
                    });
                }
            }
            alert("Datuak ondo gorde dira!");
            e.target.reset();
            selectProfesor.disabled = true;
        } catch (err) { alert(err.message); }
        finally { btn.disabled = false; }
    });

    const q = query(collection(db, "ekarpenak"), orderBy("fecha", "desc"));
    onSnapshot(q, (snapshot) => {
        const tabla = document.getElementById("tablaDatos");
        tabla.innerHTML = "";
        snapshot.forEach((doc) => {
            const d = doc.data();
            const fila = document.createElement("tr");
            fila.innerHTML = `
                <td><strong>${d.ikastetxea}</strong><br><small>${d.izenAbizenak}</small></td>
                <td><span class="opcion-tag">${d.aukera}</span></td>
                <td>${d.deskribapena}</td>
                <td>${d.adibidea.includes('http') ? `<a href="${d.adibidea}" target="_blank">Lotura</a>` : d.adibidea}</td>
                <td style="display:none">${d.email}</td>
                <td style="display:none">${d.kodea}</td>`;
            tabla.appendChild(fila);
        });
    });

    window.desbloquearTodo = function() {
        const pass = prompt("Sartu pasahitza:");
        if (pass === "1234") { 
            document.getElementById("seccionAdmin").style.display = "block";
        } else { alert("Okerra!"); }
    };

    document.getElementById("exportarCSV").addEventListener("click", () => {
        const filas = document.querySelectorAll("#tablaCompleta tr");
        // Cabecera actualizada con Email y Kodea
        let csv = "\uFEFFIkastetxea;Irakaslea;Estrategia;Deskribapena;Adibidea;Email;Kodea\n";
        
        filas.forEach((f, i) => {
            if (i === 0) return; // Saltamos cabecera de la tabla HTML
            const cols = f.querySelectorAll("td");
            
            // Separamos Ikastetxea e Irakaslea que vienen en la misma celda visualmente
            const autorRaw = cols[0].innerText.split("\n");
            const centro = autorRaw[0] || "";
            const profe = autorRaw[1] || "";
            
            const estrategia = cols[1].innerText;
            const desc = cols[2].innerText;
            const link = cols[3].innerText;
            const mail = cols[4].innerText;
            const cod = cols[5].innerText;

            csv += `"${centro}";"${profe}";"${estrategia}";"${desc}";"${link}";"${mail}";"${cod}"\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
