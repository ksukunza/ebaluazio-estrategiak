<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebaluaziorako estrategiak</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #76b895;
            --primary-dark: #4a7a62;
            --bg: #f3f4f6;
            --white: #ffffff;
            --text: #323130;
        }

        /* Diseño Base */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            line-height: 1.5;
        }

        .contenedor {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        /* Formulario Responsive */
        form {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
            background-color: #fcfcfc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        @media (min-width: 768px) {
            .contenedor { padding: 40px; }
            h2 { font-size: 1.8rem; }
            form { grid-template-columns: 1fr 1fr; padding: 25px; gap: 20px; }
            .fila-completa { grid-column: 1 / -1; }
        }

        form label {
            display: flex;
            flex-direction: column;
            font-weight: 600;
            font-size: 0.9rem;
            color: #605e5c;
        }

        form input, form select, form textarea {
            margin-top: 8px;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #d1d1d1;
            border-radius: 6px;
            background-color: #fff;
            width: 100%;
            box-sizing: border-box;
        }

        /* Estilo para campos que no se pueden editar manualmente */
        .campo-autocompletado {
            background-color: #f0f0f0;
            color: #777;
            cursor: not-allowed;
        }

        /* BLOQUE DE ESTRATEGIA RESALTADO */
        .seccion-estrategia {
            grid-column: 1 / -1;
            background-color: #f0f9f4;
            padding: 25px;
            border-radius: 10px;
            border-left: 6px solid var(--primary);
            display: grid;
            gap: 20px;
            margin: 10px 0;
        }

        .seccion-estrategia label:first-child {
            color: var(--primary-dark) !important;
            font-size: 1.25rem !important;
            font-weight: 800 !important;
            display: block;
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(118, 184, 149, 0.3);
            padding-bottom: 10px;
        }

        .botones {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (min-width: 480px) {
            .botones { flex-direction: row; }
        }

        button {
            padding: 14px 24px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary { background-color: var(--primary); color: white; flex: 2; }
        .btn-primary:hover { background-color: var(--primary-dark); }
        .btn-secondary { background-color: #fff; color: #666; border: 1px solid #ccc; flex: 1; }

        /* TABLA RESPONSIVA */
        .table-responsive { overflow-x: auto; }
        
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid #e1dfdd; margin-bottom: 15px; border-radius: 8px; background: #fff; padding: 10px; }
            td {
                border: none;
                position: relative;
                padding-left: 45% !important;
                text-align: right !important;
                padding-top: 10px;
                padding-bottom: 10px;
                border-bottom: 1px solid #eee;
            }
            td::before {
                content: attr(data-label);
                position: absolute;
                left: 10px;
                width: 40%;
                text-align: left;
                font-weight: bold;
                color: var(--primary-dark);
            }
        }

        @media (min-width: 769px) {
            table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; }
            thead th { background-color: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid var(--primary); }
            tbody td { padding: 15px; border-bottom: 1px solid #e1dfdd; vertical-align: top; }
        }

        .opcion-tag {
            background-color: #eef7f2;
            color: #4e8a6b;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .footer-logo { margin-top: 30px; text-align: center; }
        .footer-logo img { max-height: 50px; opacity: 0.9; }

        #loading { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2><i class="fa-solid fa-users-rectangle"></i> Ebaluaziorako estrategiak</h2>

    <form id="dataForm">
        <label>
            Ikastetxea
            <select id="selectCentro" required>
                <option value="">Aukeratu ikastetxea...</option>
            </select>
        </label>

        <label>
            Izen-abizenak
            <select id="selectProfesor" required disabled>
                <option value="">Lehenengo ikastetxea aukeratu...</option>
            </select>
        </label>

        <label>Kodea <input type="text" id="kodea" class="campo-autocompletado" readonly placeholder="Automatikoa..."></label>
        <label>Emaila <input type="email" id="email" class="campo-autocompletado" readonly placeholder="Automatikoa..."></label>

        <div class="seccion-estrategia">
            <label>
                Zer estrategia “funtzional” eta zehatz erabiltzen dugu ebaluazio formatzailerako? (praktika onak):
                <select id="aukera" required>
                    <option value="">Aukeratu bat...</option>
                    <option value="Ikas-helburuak partekatzeko">Ikas-helburuak partekatzeko</option>
                    <option value="Aurrezagutzak azaleratzeko">Aurrezagutzak azaleratzeko</option>
                    <option value="Kalitatezko feedback emateko">Kalitatezko feedback emateko</option>
                    <option value="Ko-ebaluazioa egiteko">Ko-ebaluazioa egiteko</option>
                    <option value="Autoebaluazioa (erregulazioa) egiteko">Autoebaluazioa (erregulazioa) egiteko</option>
                </select>
            </label>

            <label>Estrategiaren deskribapena <textarea id="deskribapena" rows="3" placeholder="Deskribatu estrategia..." required></textarea></label>
            <label>Estrategiaren adibidea, esteka,... <input type="text" id="adibidea" placeholder="Adibidea edo esteka..." required></label>
        </div>

        <div class="botones">
            <button type="submit" class="btn-primary" id="btnEnviar"><i class="fa-solid fa-paper-plane"></i> Gehitu</button>
            <button type="button" class="btn-secondary" id="exportarCSV"><i class="fa-solid fa-file-csv"></i> Esportatu CSV</button>
        </div>
    </form>

    <div class="table-responsive">
        <table id="tablaCompleta">
            <thead>
                <tr>
                    <th>Egilea</th>
                    <th>Aukera</th>
                    <th>Deskribapena</th>
                    <th>Adibidea</th>
                </tr>
            </thead>
            <tbody id="tablaDatos"></tbody>
        </table>
        <div id="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> Datuak kargatzen...</div>
    </div>

    <div class="footer-logo">
        <img src="Eskola.png" alt="Logotipoa">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- BASE DE DATOS DE EJEMPLO PARA LA PRUEBA ---
    const datosCentros = {
        "Amara Berri": {
            codigo: "012345",
            profesores: [
                { nombre: "Ane Garcia", email: "ane@amaraberri.eus" },
                { nombre: "Jon Altuna", email: "jon@amaraberri.eus" }
            ]
        },
        "Zubiri Manteo": {
            codigo: "015678",
            profesores: [
                { nombre: "Miren Urquijo", email: "miren@zubiri.eus" },
                { nombre: "Xabier Lopez", email: "xabier@zubiri.eus" }
            ]
        },
        "Pasaia Lizeoa": {
            codigo: "014422",
            profesores: [
                { nombre: "Iker Iturbe", email: "i.iturbe@lizeoa.eus" },
                { nombre: "Amaia Elorza", email: "a.elorza@lizeoa.eus" }
            ]
        }
    };

    const selectCentro = document.getElementById("selectCentro");
    const selectProfesor = document.getElementById("selectProfesor");
    const inputKodea = document.getElementById("kodea");
    const inputEmail = document.getElementById("email");

    // Cargar Centros
    Object.keys(datosCentros).forEach(centro => {
        let opt = document.createElement("option");
        opt.value = centro;
        opt.textContent = centro;
        selectCentro.appendChild(opt);
    });

    // Lógica al elegir Centro
    selectCentro.addEventListener("change", () => {
        const centroSel = selectCentro.value;
        selectProfesor.innerHTML = '<option value="">Aukeratu irakaslea...</option>';
        inputEmail.value = "";
        
        if (centroSel) {
            inputKodea.value = datosCentros[centroSel].codigo;
            selectProfesor.disabled = false;
            datosCentros[centroSel].profesores.forEach(prof => {
                let opt = document.createElement("option");
                opt.value = prof.nombre;
                opt.textContent = prof.nombre;
                opt.dataset.email = prof.email;
                selectProfesor.appendChild(opt);
            });
        } else {
            inputKodea.value = "";
            selectProfesor.disabled = true;
        }
    });

    // Lógica al elegir Profesor
    selectProfesor.addEventListener("change", () => {
        const profSel = selectProfesor.options[selectProfesor.selectedIndex];
        inputEmail.value = profSel.dataset.email || "";
    });

    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyAV_g9Bd29B3kzuZqsHnE6WU4QzttmbhAk",
        authDomain: "ekarpenakapp.firebaseapp.com",
        projectId: "ekarpenakapp",
        storageBucket: "ekarpenakapp.firebasestorage.app",
        messagingSenderId: "958519034694",
        appId: "1:958519034694:web:e07751035d587322379b47"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Guardar
    document.getElementById("dataForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnEnviar");
        
        const datos = {
            ikastetxea: selectCentro.value,
            kodea: inputKodea.value,
            izenAbizenak: selectProfesor.value,
            email: inputEmail.value,
            aukera: document.getElementById("aukera").value,
            deskribapena: document.getElementById("deskribapena").value,
            adibidea: document.getElementById("adibidea").value,
            fecha: serverTimestamp()
        };

        btn.disabled = true;
        btn.textContent = "Bidaltzen...";

        try {
            await addDoc(collection(db, "ekarpenak"), datos);
            e.target.reset();
            selectProfesor.disabled = true;
        } catch (err) { alert("Errorea: " + err.message); }
        finally { 
            btn.disabled = false; 
            btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Gehitu';
        }
    });

    // Leer
    const q = query(collection(db, "ekarpenak"), orderBy("fecha", "desc"));
    onSnapshot(q, (snapshot) => {
        document.getElementById("loading").style.display = "none";
        const tabla = document.getElementById("tablaDatos");
        tabla.innerHTML = "";
        
        snapshot.forEach((doc) => {
            const d = doc.data();
            const fila = document.createElement("tr");
            fila.innerHTML = `
                <td data-label="Egilea"><strong>${d.ikastetxea}</strong><br><small>${d.izenAbizenak}</small></td>
                <td data-label="Aukera"><span class="opcion-tag">${d.aukera}</span></td>
                <td data-label="Deskribapena">${d.deskribapena}</td>
                <td data-label="Adibidea">${d.adibidea.includes('http') ? `<a href="${d.adibidea}" target="_blank">Ikusi</a>` : d.adibidea}</td>
            `;
            tabla.appendChild(fila);
        });
    });

    // Exportar CSV
    document.getElementById("exportarCSV").addEventListener("click", function () {
        let csv = ["\uFEFFIkastetxea,Kodea,Egilea,Email,Aukera,Deskribapena,Adibidea"];
        onSnapshot(q, (snapshot) => {
            snapshot.forEach(doc => {
                const d = doc.data();
                csv.push(`"${d.ikastetxea}","${d.kodea}","${d.izenAbizenak}","${d.email}","${d.aukera}","${d.deskribapena.replace(/"/g, '""')}","${d.adibidea}"`);
            });
            const blob = new Blob([csv.join("\n")], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "ebaluazio_estrategiak.csv";
            link.click();
        }, { onlyOnce: true });
    });
</script>
</body>
</html>
