<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekarpenen Erregistroa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* COLOR VERDE PERSONALIZADO */
            --primary: #76b895;
            --primary-dark: #5a8c73;
            --bg: #f3f4f6;
            --white: #ffffff;
            --text: #323130;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .contenedor {
            max-width: 950px;
            margin: 0 auto;
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            position: relative;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        /* Formulario */
        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 40px;
            background-color: #fcfcfc;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        form label {
            display: flex;
            flex-direction: column;
            font-weight: 600;
            font-size: 0.9rem;
            color: #605e5c;
        }

        form input, form select {
            margin-top: 8px;
            padding: 12px;
            font-size: 15px;
            border: 1px solid #d1d1d1;
            border-radius: 6px;
            transition: all 0.2s;
        }

        form input:focus, form select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(118, 184, 149, 0.2);
        }

        .fila-completa { grid-column: 1 / -1; }

        /* Botones */
        .botones {
            grid-column: 1 / -1;
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            flex: 2;
        }
        .btn-primary:hover { background-color: var(--primary-dark); }

        .btn-secondary {
            background-color: #fff;
            color: #666;
            border: 1px solid #ccc;
            flex: 1;
        }
        .btn-secondary:hover { background-color: #f3f3f3; }

        /* Tabla */
        .table-responsive { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        thead th {
            background-color: #f8f9fa;
            color: #444;
            padding: 16px;
            text-align: left;
            border-bottom: 2px solid var(--primary);
        }

        tbody td {
            padding: 16px;
            border-bottom: 1px solid #e1dfdd;
        }

        /* Estilo Chips Temas */
        .tema-chip {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .tema-A { background-color: #eef7f2; color: #4e8a6b; }
        .tema-B { background-color: #f0f4ff; color: #4b6ea3; }
        .tema-C { background-color: #fff4ce; color: #7a5e0b; }

        /* Logo pie */
        .footer-logo {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: right;
        }

        .footer-logo img {
            max-height: 60px;
            width: auto;
        }

        #loading { text-align: center; padding: 20px; color: #666; }

        /* Móvil */
        @media (max-width: 700px) {
            form { grid-template-columns: 1fr; }
            .botones { flex-direction: column; }
            thead { display: none; }
            tbody tr { display: block; border: 1px solid #eee; margin-bottom: 10px; border-radius: 8px; padding: 10px; }
            tbody td { display: block; text-align: right; border: none; }
            tbody td::before { content: attr(data-label); float: left; font-weight: bold; color: #888; }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h2><i class="fa-solid fa-users-rectangle"></i> Ekarpenen Erregistroa</h2>

    <form id="dataForm">
        <label>
            Ikastetxearen izena
            <input type="text" id="centro" placeholder="Adib: Lizeo Axular..." required>
        </label>

        <label>
            Landu beharreko gaia
            <select id="tema" required>
                <option value="">Aukeratu gai bat...</option>
                <option value="A">Inklusioa: ikasleen artean</option>
                <option value="B">Inklusioa: ikasle-irakasle artean</option>
                <option value="C">Hizkuntza aldamiajea</option>
            </select>
        </label>

        <label class="fila-completa">
            Ekarpena esaldi batean
            <input type="text" id="aportacion" placeholder="Idatzi hemen zure ekarpena..." required>
        </label>

        <div class="botones">
            <button type="submit" class="btn-primary" id="btnEnviar">
                <i class="fa-solid fa-paper-plane"></i> Gehitu
            </button>
            <button type="button" class="btn-secondary" id="exportarCSV">
                <i class="fa-solid fa-file-csv"></i> CSV-ra esportatu
            </button>
        </div>
    </form>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th width="30%">Ikastetxea</th>
                    <th width="30%">Gaia</th>
                    <th width="40%">Ekarpena</th>
                </tr>
            </thead>
            <tbody id="tablaDatos"></tbody>
        </table>
        <div id="loading"><i class="fa-solid fa-spinner fa-spin"></i> Kargatzen...</div>
    </div>

    <div class="footer-logo">
        <img src="Eskola.png" alt="Logotipoa">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --------------------------------------------------------------
    // ⚠️ PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE ⚠️
    // --------------------------------------------------------------
    const firebaseConfig = {
         apiKey: "AIzaSyAV_g9Bd29B3kzuZqsHnE6WU4QzttmbhAk",
    authDomain: "ekarpenakapp.firebaseapp.com",
    projectId: "ekarpenakapp",
    storageBucket: "ekarpenakapp.firebasestorage.app",
    messagingSenderId: "958519034694",
    appId: "1:958519034694:web:e07751035d587322379b47"
    };
    // --------------------------------------------------------------

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tabla = document.getElementById("tablaDatos");
    const loading = document.getElementById("loading");

    // Enviar datos
    document.getElementById("dataForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        const btn = document.getElementById("btnEnviar");
        const centro = document.getElementById("centro").value;
        const tema = document.getElementById("tema").value;
        const aportacion = document.getElementById("aportacion").value;

        btn.disabled = true;
        btn.innerHTML = "Bidaltzen...";

        try {
            await addDoc(collection(db, "ekarpenak"), {
                centro, tema, aportacion, fecha: serverTimestamp()
            });
            this.reset();
        } catch (error) {
            alert("Errorea: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Gehitu';
        }
    });

    // Leer datos
    const q = query(collection(db, "ekarpenak"), orderBy("fecha", "desc"));
    onSnapshot(q, (snapshot) => {
        loading.style.display = "none";
        tabla.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const fila = document.createElement("tr");
            
            let temaClass = "tema-chip";
            if(data.tema.startsWith("A")) temaClass += " tema-A";
            else if(data.tema.startsWith("B")) temaClass += " tema-B";
            else if(data.tema.startsWith("C")) temaClass += " tema-C";

            fila.innerHTML = `
                <td data-label="Ikastetxea"><strong>${data.centro}</strong></td>
                <td data-label="Gaia"><span class="${temaClass}">${data.tema}</span></td>
                <td data-label="Ekarpena">${data.aportacion}</td>
            `;
            tabla.appendChild(fila);
        });
    });

    // Exportar CSV
    document.getElementById("exportarCSV").addEventListener("click", function () {
        const filas = document.querySelectorAll("#tablaDatos tr");
        if(filas.length === 0) return alert("Ez dago daturik.");
        let csv = ["\uFEFFIkastetxea,Gaia,Ekarpena"];
        filas.forEach(f => {
            const c = Array.from(f.querySelectorAll("td")).map(td => `"${td.innerText.replace(/"/g, '""')}"`);
            csv.push(c.join(","));
        });
        const blob = new Blob([csv.join("\n")], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ekarpenak.csv";
        link.click();
    });
</script>
</body>
</html>
